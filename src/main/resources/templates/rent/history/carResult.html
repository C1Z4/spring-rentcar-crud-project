<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="common/layout :: head"></head>
<body>
<div class="main-container">
  <th:block th:insert="common/layout :: header"></th:block>

  <main class="page-content" style="flex-direction: column">
    <h2>🚙차량별 대여 이력🚙</h2>
    <table>
      <tr><th>회원명</th><th>대여일</th><th>반납일</th><th>차량번호</th><th>연체</th></tr>
      <tr th:each="history : ${historyList}">
        <td th:text="${history.memberCode.memberName}"></td>
        <td th:text="${history.rentDate}"></td>
        <td th:text="${history.returnDate}"></td>
        <td th:text="${history.carCode.carNum}"></td>
        <td th:text="${history.delayStatus} ? '예' : '아니오'"></td>
      </tr>
    </table>
  </main>

  <th:block th:insert="common/layout :: footer"></th:block>
</div>
</body>
</html>
