<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <style>
    body { background: cornflowerblue;
    color: darkblue;}

    h2 {text-align: center;
    color: darkblue;
    font-weight: 100;}

    table {
      width: 80%;
      background: khaki;
      border-radius: 8px;
      margin: auto;
    }

    th {
      text-align: center;
      font-size: 16px;
      background: aliceblue;
      color: darkblue;
    }

    td {
      text-align: center;
      font-size: 16px;
    }
  </style>
</head>
<body>
<h2>🚘회원별 대여 이력🚘</h2>
<table>
  <tr><th>회원명</th><th>대여일</th><th>반납일</th><th>차량번호</th><th>연체</th></tr>
  <tr th:each="history : ${historyList}">
    <td th:text="${history.memberCode.memberName}"></td>
    <td th:text="${history.rentDate}"></td>
    <td th:text="${history.returnDate}"></td>
    <td th:text="${history.carCode.carNum}"></td>
    <td th:text="${history.delayStatus} ? '예' : '아니오'"></td>
  </tr>
</table>
</body>
</html>
