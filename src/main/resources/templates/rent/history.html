<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="common/layout :: head"></head>
<body>
<div class="main-container">
    <th:block th:insert="common/layout :: header"></th:block>

    <main class="page-content" style="flex-direction: column">
        <h1>대여 이력</h1>
        <form action="/rent/history" method="get">
            <label for="delayStatus">연체 여부 : </label>
            <select name="delayStatus" id="delayStatus" onchange="this.form.submit()">
                <option value="전체" th:selected="${delayStatus eq '전체'}">전체</option>
                <option value="정상" th:selected="${delayStatus eq '정상'}">정상</option>
                <option value="연체" th:selected="${delayStatus eq '연체'}">연체</option>
            </select>
        </form>

        <table>
            <tr>
                <th>대여일</th>
                <th>반납일</th>
                <th>대여 예정 시간</th>
                <th>연체 여부</th>
                <th>차량 번호</th>
                <th>대여 가격</th>
                <th>대여 위치</th>
                <th>대여 가능 여부</th>
                <th>회원 이름</th>
                <th>회원 전화번호</th>
                <th>회원 등급</th>
                <th>반납</th>
            </tr>
            <tr th:each="rentHistory : ${rentHistoryList}">
                <td th:text="${rentHistory.rentDate}"></td>
                <td th:text="${rentHistory.returnDate}"></td>
                <td th:text="${rentHistory.rentTime} + '시간'"></td>
                <td th:text="${rentHistory.delayStatus ? '연체' : '정상'}"></td>
                <td th:text="${rentHistory.carCode.carNum}"></td>
                <td th:text="${rentHistory.carCode.carPrice} + '원'"></td>
                <td th:text="${rentHistory.carCode.rentLocation}"></td>
                <td th:text="${rentHistory.carCode.rentStatus ? '가능' : '불가능'}"></td>
                <td th:text="${rentHistory.memberCode.memberName}"></td>
                <td th:text="${rentHistory.memberCode.phone}"></td>
                <td th:text="${rentHistory.memberCode.level}"></td>
                <td>
                    <form th:action="@{/rent/return}" method="post">
                        <input type="hidden" th:name="memberCode" th:value="${rentHistory.memberCode.memberCode}" />
                        <input type="hidden" th:name="carCode" th:value="${rentHistory.carCode.carCode}" />
                        <button type="submit"
                                th:text="${rentHistory.returnDate} ? '반납완료' : '반납하기'"
                                th:disabled="${rentHistory.returnDate}"
                                class="btn"
                                th:classappend="${rentHistory.returnDate} ? 'disabled-btn' : ''"
                                style="min-width: 70px; font-size: 0.8em; white-space: nowrap">
                        </button>
                    </form>
                </td>

            </tr>
        </table>
    </main>
    <th:block th:insert="common/layout :: footer"></th:block>
</div>
<script th:inline="javascript">
    const successMessage = '[[${ successMessage }]]'
    const failMessage = '[[${ failMessage }]]'

    if (successMessage && successMessage !== 'null') {
        alert(successMessage)
    }
</script>
</body>
</html>

<style>
    body {
        font-family: 'Arial', sans-serif;
        margin: 40px;
    }
    h1 {
        text-align: center;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 25px;
    }
    th, td {
        border: 1px solid #ccc;
        padding: 12px;
        text-align: center;
        vertical-align: top;
    }
    th {
        background-color: #f2f2f2;
    }
    pre {
        margin: 0;
        font-family: 'Courier New', monospace;
        white-space: pre-wrap;
        word-wrap: break-word;
    }

    .disabled-btn {
        background-color: #ccc;
        color: #666;
        cursor: not-allowed;
        border: 1px solid #999;
    }

</style>
