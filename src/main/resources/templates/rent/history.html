<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>대여 이력</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 40px;
        }
        h1 {
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
            vertical-align: top;
        }
        th {
            background-color: #f2f2f2;
        }
        pre {
            margin: 0;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
    <script>
        /*<![CDATA[*/
        const successMessage = /*[[${successMessage != null ? "'" + successMessage + "'" : "null"}]]*/ null;
        const failMessage = /*[[${failMessage != null ? "'" + failMessage + "'" : "null"}]]*/ null;

        if (successMessage !== null) {
            alert(successMessage)
        } else if (failMessage !== null) {
            alert(failMessage)
        }
    </script>
</head>
<body>
<h1>대여 이력</h1>
<form action="rent/history" method="get">
    <label for="delayStatus">연체 여부 : </label>
    <select name="delayStatus" id="delayStatus">
        <option value="전체" th:selected="${delayStatus == '전체'}">전체</option>
        <option value="정상" th:selected="${delayStatus == '정상'}">정상</option>
        <option value="연체" th:selected="${delayStatus == '연체'}">연체</option>
    </select>
    <input type="submit" value="전송">
</form>

<table>
    <tr>
        <th>대여일</th>
        <th>반납일</th>
        <th>대여 예정 시간</th>
        <th>연체 여부</th>
        <th>차량 정보</th>
        <th>회원 정보</th>
        <th>반납</th>
    </tr>
    <tr th:each="rentHistory : ${rentHistoryList}">
        <td th:text="${rentHistory.rentDate}"></td>
        <td th:text="${rentHistory.returnDate}"></td>
        <td th:text="${rentHistory.rentTime} + '시간'"></td>
        <td th:text="${rentHistory.delayStatus ? '연체' : '정상'}"></td>
        <<td>
            <span>차량 코드 : <span th:text="${rentHistory.carCode.carCode}"></span></span><br>
            <span>차량 번호 : <span th:text="${rentHistory.carCode.carNum}"></span></span><br>
            <span>대여 가격 : <span th:text="${rentHistory.carCode.carPrice} + '원'"></span></span><br>
            <span>대여 위치 : <span th:text="${rentHistory.carCode.rentLocation}"></span></span><br>
            <span>대여 가능 여부 : <span th:text="${rentHistory.carCode.rentStatus ? '가능' : '불가능'}"></span></span><br>
            <span>세부 차량 코드 : <span th:text="${rentHistory.carCode.modelCode}"></span></span><br>
        </td>
        <td>
            <span>회원 코드 : <span th:text="${rentHistory.memberCode.memberCode}"></span></span><br>
            <span>회원 이름 : <span th:text="${rentHistory.memberCode.memberName}"></span></span><br>
            <span>전화번호 : <span th:text="${rentHistory.memberCode.phone}"></span></span><br>
            <span>회원 등급 : <span th:text="${rentHistory.memberCode.level}"></span></span><br>
        </td>
        <td>
            <form th:action="@{/rent/return}" method="post">
                <input type="hidden" th:name="memberCode" th:value="${rentHistory.memberCode.memberCode}" />
                <input type="hidden" th:name="carCode" th:value="${rentHistory.carCode.carCode}" />
                <button type="submit" th:disabled="${rentHistory.returnDate}">반납하기</button>
            </form>
        </td>

    </tr>
</table>
</body>
</html>
