<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="common/layout :: head"></head>
<body>
    <div class="main-container">
        <th:block th:insert="common/layout :: header"></th:block>

        <main class="page-content">
            <form action="/member/register" method="post">
                <label>회원이름</label>
                <input type="text" placeholder="예시: 김철수" name="memberName"/><br>
                <label>연락처</label>
                <input type="text" placeholder="예시: 010-1234-5678" name="phone"/><br>
                <button class="btn" type="submit">등록</button>
            </form>
            <th:block th:insert="member/all-member-list :: memberTable"></th:block>
        </main>

        <th:block th:insert="common/layout :: footer"></th:block>
    </div>
</body>
</html>
